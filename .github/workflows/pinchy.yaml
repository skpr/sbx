name: pinchy

on:
  push:
    branches: [main]
    paths:
      - "pinchy/**"
      - ".github/workflows/pinchy.yaml"
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./pinchy
          file: ./pinchy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/skpr/sbx:pinchy-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
